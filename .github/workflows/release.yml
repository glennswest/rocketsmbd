name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  # The repo .cargo/config.toml names a dev-host (macOS) musl linker; override
  # it for the CI runner, which provides musl-gcc via musl-tools.
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install build deps
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y musl-tools
          cargo install cargo-deb cargo-generate-rpm
      - name: Build static binary
        run: cargo build --release --target x86_64-unknown-linux-musl
      - name: Build .deb and .rpm
        run: |
          set -e
          mkdir -p out
          cargo deb --no-build --target x86_64-unknown-linux-musl --output out/
          cargo generate-rpm --target x86_64-unknown-linux-musl -o out/
          cp target/x86_64-unknown-linux-musl/release/rocketsmbd out/rocketsmbd-x86_64-linux-musl
          ls -la out/
      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
