name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            binsuffix: x86_64-linux-musl
          - target: aarch64-unknown-linux-musl
            binsuffix: aarch64-linux-musl
    env:
      # Static musl builds bundle musl libc; the cross gnu-gcc serves as the
      # linker for both arches (the dev-host linker in .cargo/config.toml is
      # overridden here for CI).
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install build deps
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          cargo install cargo-deb cargo-generate-rpm
      - name: Build static binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build .deb and .rpm
        run: |
          set -e
          mkdir -p out
          cargo deb --no-build --target ${{ matrix.target }} --output out/
          # Static binary: no library auto-deps (the only dependency is the
          # kernel's io_uring, checked at runtime — see probe_io_uring()).
          cargo generate-rpm --target ${{ matrix.target }} --auto-req no -o out/
          cp target/${{ matrix.target }}/release/rocketsmbd out/rocketsmbd-${{ matrix.binsuffix }}
          ls -la out/
      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
