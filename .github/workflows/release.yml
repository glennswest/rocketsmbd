name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install build deps
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            mkdir -p .cargo
            printf '[target.aarch64-unknown-linux-musl]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml
          fi
          cargo install cargo-deb cargo-generate-rpm
      - name: Build static binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build .deb
        run: cargo deb --no-build --target ${{ matrix.target }} --output dist/
      - name: Build .rpm
        run: |
          cargo generate-rpm --target ${{ matrix.target }} --payload-compress none -o dist/ || \
          cargo generate-rpm --target ${{ matrix.target }} -o dist/
      - name: Collect artifacts
        run: |
          set -e
          mkdir -p out
          cp target/${{ matrix.target }}/release/rocketsmbd "out/rocketsmbd-${{ matrix.target }}"
          cp dist/*.deb dist/*.rpm out/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: out/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten
        run: mkdir -p rel && find artifacts -type f -exec cp {} rel/ \;
      - uses: softprops/action-gh-release@v2
        with:
          files: rel/*
          generate_release_notes: true
